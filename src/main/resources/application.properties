spring.application.name=biblioteca

# Banco (Supabase Postgres) - configurar via variaveis de ambiente
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/biblioteca}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexoes reduzido (Supabase free tem limite de 15 no session pooler)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Porta (Render injeta a variavel PORT)
server.port=${PORT:8080}
